events {
    # 1024 concurrent connections is plenty for an Orange Pi
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Map file extensions to correct MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging optimized for performance (Turn off access logs if Traefik already handles them)
    access_log off;
    error_log /var/log/nginx/error.log warn;

    # Performance optimizations for ARM/Linux kernels
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Security: Hide the NGINX version number from HTTP headers
    server_tokens off;

    # Temporary directory overrides required for unprivileged user execution
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server {
        # Port 8080 is standard for unprivileged NGINX (cannot bind to port 80 without root)
        listen 8080;
        server_name localhost;

        # Directory where your static chat widget files live
        root /usr/share/nginx/html;
        index index.html;

        # Serve static assets instantly, return 404 if file missing
        location / {
            try_files $uri $uri/ =404;
        }

        # Cache static widget assets (JS, CSS, Images) in browser to reduce Orange Pi disk reads
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2)$ {
            expires 7d;
            access_log off;
            add_header Cache-Control "public, no-transform";
        }

        # Explicitly deny access to hidden files (like .git or .env)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
